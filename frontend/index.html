<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #stuff {
            min-height: 100dvh;
            
            justify-content: center;
            align-items: center;
            background-color: lightcoral;
            display: flex;
        }
    </style>
</head>
<body>
    <div class="container" id="stuff">
        <input type="text" id="my-otp">
        <button type="submit" onclick="foo()">OK</button>
    </div>
    <script>
        async function foo(){
            const otp = document.getElementById("my-otp").value
            const data = {"code": otp}
            const response = await fetch('/validateMFA', {
                method: 'POST',
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            })
            if(response.ok){
                window.location.href = '/app.html'
            }
        }
    </script>
</body>
</html>
